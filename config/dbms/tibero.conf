# config/dbms/tibero.conf
# DBMS 진단 설정 - Phase 0 (read-only evidence 모드)
# -----------------------------------------------------------------------------
# Phase 0 정책: 실제 DB 접속 금지, 로컬 증적 파일만 분석
# -----------------------------------------------------------------------------

PROFILE="tibero"
AUDIT_ONLY=true
DRY_RUN=true
REMEDIATE=false
DIRECT_DB_ACCESS=false
DIRECT_DEVICE_ACCESS=false
NOT_IMPLEMENTED_AS_PASS=false
EVIDENCE_REQUIRED=true

# 증적 경로
EVIDENCE_INPUT_DIR="input/evidence/dbms/tibero"
EVIDENCE_OUTPUT_DIR="output/evidence/dbms/tibero"

# 민감정보 마스킹
MASK_CREDENTIALS=true
MASK_INTERNAL_IP=true
MASK_DB_ACCOUNTS=true

# Phase 0: DB 접속 정보는 설정해도 사용하지 않음 (경고만 기록)
# DB_HOST=
# DB_PORT=
# DB_USER=
# DB_PASSWORD=
# JDBC_URL=
# ODBC_DSN=
