# =============================================================================
# linux-vul-assessor configuration
# =============================================================================

# ── S3 설정 ──────────────────────────────────────────────────────────────────
# 진단 결과 MD 파일이 업로드될 S3 버킷명
S3_BUCKET="your-audit-results-bucket"

# S3 버킷 내 저장 경로 prefix
# 실제 키: {S3_PREFIX}/{check_id}_{instance_id}_{timestamp}.md
S3_PREFIX="linux-vul/results"

# AWS 리전
AWS_REGION="ap-northeast-2"

# S3 업로드 활성화 여부 (true/false)
# false 로 설정하면 로컬 output/evidence 에만 저장
S3_UPLOAD_ENABLED="false"

# ── 진단 실행 설정 ────────────────────────────────────────────────────────────
# 스크립트별 타임아웃 (초)
AUDIT_TIMEOUT=30

# EC2 메타데이터에서 인스턴스 ID 자동 감지 (true/false)
# false 이면 hostname 사용
AUTO_DETECT_INSTANCE_ID="true"

# AUTO_DETECT_INSTANCE_ID=false 일 때 사용할 식별자
INSTANCE_ID_FALLBACK="$(hostname -s 2>/dev/null || echo 'local')"

# ── SSM Runbook 설정 ──────────────────────────────────────────────────────────
# SSM 문서 이름 (AWS에 등록 시 사용)
SSM_DOC_SINGLE="linux-vul-single-check"
SSM_DOC_FULL="linux-vul-full-audit"

# SSM 실행 결과를 S3에 저장할 때 사용하는 로그 버킷 (SSM 전용, 비워도 됨)
SSM_OUTPUT_S3_BUCKET=""
SSM_OUTPUT_S3_PREFIX="ssm-run-command-logs"
