---
# =============================================================================
# AWS SSM Automation Document — linux-vul-single-check
# Purpose : Run a single U-xx check on a target EC2 instance,
#           save evidence to S3 as {check_id}_{instance_id}_{timestamp}.md
#
# Usage (CLI):
#   aws ssm start-automation-execution \
#     --document-name linux-vul-single-check \
#     --parameters \
#       "InstanceId=i-0123456789abcdef0,\
#        CheckId=U-01,\
#        OsProfile=ubuntu,\
#        S3Bucket=my-audit-bucket,\
#        S3Prefix=linux-vul/results,\
#        RepoPath=/opt/linux_vul"
# =============================================================================
schemaVersion: "0.3"
description: "Run a single linux-vul U-xx check on one EC2 instance and upload the MD result to S3."

parameters:
  InstanceId:
    type: String
    description: "(Required) Target EC2 instance ID (e.g., i-0123456789abcdef0)"
  CheckId:
    type: String
    description: "(Required) Check identifier to run (e.g., U-01)"
    allowedPattern: "U-[0-9]{2}"
  OsProfile:
    type: String
    description: "(Required) Target OS profile"
    allowedValues:
      - ubuntu
      - centos
      - rocky
      - fedora
      - oracle
    default: ubuntu
  S3Bucket:
    type: String
    description: "(Required) S3 bucket name for result upload"
  S3Prefix:
    type: String
    description: "(Optional) S3 key prefix"
    default: "linux-vul/results"
  AwsRegion:
    type: String
    description: "(Optional) AWS region for S3 upload"
    default: "ap-northeast-2"
  RepoPath:
    type: String
    description: "(Optional) Absolute path to linux_vul repo on the instance"
    default: "/opt/linux_vul"
  AuditTimeout:
    type: Integer
    description: "(Optional) Timeout (seconds) per check script"
    default: 30

mainSteps:

  # ── Step 1: Validate instance is reachable via SSM ──────────────────────────
  - name: VerifyInstance
    action: aws:waitForAwsResourceProperty
    maxAttempts: 3
    timeoutSeconds: 60
    inputs:
      Service: ssm
      Api: DescribeInstanceInformation
      Filters:
        - Key: InstanceIds
          Values:
            - "{{ InstanceId }}"
      PropertySelector: "$.InstanceInformationList[0].PingStatus"
      DesiredValues:
        - Online

  # ── Step 2: Run the check via Run Command ───────────────────────────────────
  - name: RunCheck
    action: aws:runCommand
    maxAttempts: 1
    timeoutSeconds: 120
    inputs:
      DocumentName: AWS-RunShellScript
      InstanceIds:
        - "{{ InstanceId }}"
      Parameters:
        commands:
          - |
            set -uo pipefail

            REPO="{{ RepoPath }}"
            CHECK_ID="{{ CheckId }}"
            PROFILE="{{ OsProfile }}"
            S3_BUCKET="{{ S3Bucket }}"
            S3_PREFIX="{{ S3Prefix }}"
            AWS_REGION="{{ AwsRegion }}"
            AUDIT_TIMEOUT="{{ AuditTimeout }}"

            RUNNER="${REPO}/runners/shell_runner.sh"
            SCRIPT_PATH="${REPO}/shell_script/${PROFILE}/${CHECK_ID}.sh"
            OUTPUT_DIR="${REPO}/output/evidence"

            if [ ! -f "$RUNNER" ]; then
              echo "[SSM] ERROR: runner not found: $RUNNER" >&2
              exit 1
            fi
            if [ ! -f "$SCRIPT_PATH" ]; then
              echo "[SSM] ERROR: check script not found: $SCRIPT_PATH" >&2
              exit 2
            fi

            # Temporarily override S3 settings so runner uploads
            export S3_BUCKET S3_PREFIX AWS_REGION S3_UPLOAD_ENABLED=true AUDIT_TIMEOUT

            bash "$RUNNER" \
              --check   "$CHECK_ID" \
              --script  "$SCRIPT_PATH" \
              --output  "$OUTPUT_DIR" \
              --profile "$PROFILE"

            EXIT=$?
            echo "[SSM] ${CHECK_ID} finished with exit=${EXIT}"
            exit $EXIT
        executionTimeout: "120"

      CloudWatchOutputConfig:
        CloudWatchOutputEnabled: true
        CloudWatchLogGroupName: "/aws/ssm/linux-vul-single-check"

    outputs:
      - Name: Output
        Selector: "$.Output"
        Type: String
      - Name: ExitCode
        Selector: "$.ResponseCode"
        Type: Integer

outputs:
  - RunCheck.Output
  - RunCheck.ExitCode
